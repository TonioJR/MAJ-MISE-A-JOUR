<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis | MAJARDIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #1B4332; --lime: #B5D51E; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--dark); color: white; line-height: 1.6; }
        header { background: white; padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--lime); }
        .logo-img { height: 65px !important; width: auto; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; margin-left: 20px; font-size: 0.85rem; text-transform: uppercase; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: var(--dark); background: none; border: none; }
        section { padding: 60px 5%; max-width: 850px; margin: auto; text-align: center; }
        .form-box { background: white; color: var(--dark); padding: 45px; border-radius: 15px; text-align: left; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        input, select, textarea { width: 100%; padding: 15px; margin: 10px 0 20px; border-radius: 8px; border: 1px solid #ddd; font-size: 1rem; }
        .btn-submit { background: var(--lime); color: var(--dark); font-weight: 900; border: none; padding: 22px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 1.2rem; text-transform: uppercase; }
        footer { padding: 50px; text-align: center; opacity: 0.5; }
        @media (max-width: 1024px) { .hamburger { display: block; } nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: white; padding: 30px; border-bottom: 5px solid var(--lime); } nav.active { display: flex; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="logo.png" alt="MAJARDIN" class="logo-img"></a>
        <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <nav id="mainNav">
            <a href="index.html">Accueil</a><a href="equipe.html">L'Équipe</a><a href="realisations.html">Réalisations</a><a href="avis.html">Témoignages</a>
        </nav>
    </header>
    <section>
        <h2 style="color: var(--lime); font-size: 2.8rem; text-transform: uppercase;">Demande de Devis</h2>
        <div class="form-box">
            <form>
                <label style="font-weight:bold;">Nom & Prénom</label><input type="text" placeholder="Votre nom" required>
                <label style="font-weight:bold;">Téléphone</label><input type="tel" placeholder="06 00 00 00 00" required>
                <label style="font-weight:bold;">Ville de l'intervention</label>
                <select required>
                    <option value="">Sélectionnez votre ville...</option>
                    <optgroup label="Pévèle Carembault">
                        <option>Aix-en-Pévèle</option><option>Attiches</option><option>Auchy-lez-Orchies</option><option>Avelin</option><option>Bachy</option><option>Bersée</option><option>Bouvignies</option><option>Camphin-en-Pévèle</option><option>Cappelle-en-Pévèle</option><option>Chemy</option><option>Cobrieux</option><option>Coutiches</option><option>Cysoing</option><option>Ennevelin</option><option>Genech</option><option>Gondecourt</option><option>Herrin</option><option>Landas</option><option>Louvil</option><option>Mérignies</option><option>Moncheaux</option><option>Mons-en-Pévèle</option><option>Mouchin</option><option>Nomain</option><option>Orchies</option><option>Ostricourt</option><option>Phalempin</option><option>Pont-à-Marcq</option><option>Templeuve-en-Pévèle</option><option>Thumeries</option><option>Tourmignies</option><option>Wahagnies</option><option>Wannehain</option>
                    </optgroup>
                    <optgroup label="Hainaut">
                        <option>Saint-Amand-les-Eaux</option><option>Hasnon</option><option>Lecelles</option><option>Rosult</option><option>Millonfosse</option><option>Nivelle</option><option>Bousignies</option><option>Brillon</option><option>Sars-et-Rosières</option><option>Tilloy-lez-Marchiennes</option>
                    </optgroup>
                </select>
                <label style="font-weight:bold;">Type de projet</label>
                <select required><option>Création / Aménagement</option><option>Entretien Annuel</option><option>Élagage / Abattage</option></select>
                <button type="submit" class="btn-submit">Envoyer</button>
            </form>
        </div>
    </section>
    <script>function toggleMenu() { document.getElementById('mainNav').classList.toggle('active'); }</script>
</body>
</html>
