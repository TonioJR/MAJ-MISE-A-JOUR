<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Devis Gratuit | MAJARDIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #1B4332; --lime: #B5D51E; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        
        body { background: var(--dark); color: var(--white); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; }

        /* HEADER */
        header { background: var(--white); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--lime); position: sticky; top: 0; z-index: 2000; }
        .logo-img { height: 65px !important; width: auto; display: block; }
        nav { display: flex; gap: 20px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: var(--dark); background: none; border: none; }

        /* SECTION FORMULAIRE */
        section { padding: 60px 5%; flex: 1; max-width: 850px; margin: auto; width: 100%; text-align: center; }
        h2 { color: var(--lime); font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px; margin-bottom: 10px; }
        
        .form-box { background: var(--white); color: var(--dark); padding: 40px; border-radius: 15px; text-align: left; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); }
        
        .form-group { margin-bottom: 20px; width: 100%; }
        label { font-weight: 800; font-size: 0.8rem; text-transform: uppercase; display: block; margin-bottom: 8px; color: var(--dark); }
        
        input, select, textarea { 
            width: 100% !important; 
            padding: 15px; 
            border: 1px solid #ddd; 
            border-radius: 8px; 
            font-size: 1rem; 
            background: #f9f9f9; 
            display: block; 
            color: #333;
        }

        .btn-submit { 
            background: var(--lime); 
            color: var(--dark); 
            font-weight: 900; 
            border: none; 
            padding: 20px; 
            width: 100%; 
            border-radius: 8px; 
            cursor: pointer; 
            font-size: 1.2rem; 
            text-transform: uppercase; 
            transition: 0.3s; 
            margin-top: 10px;
        }
        .btn-submit:hover { background: #fff; box-shadow: 0 0 20px var(--lime); transform: translateY(-2px); }

        /* FOOTER */
        footer { padding: 40px; text-align: center; background: rgba(0,0,0,0.1); width: 100%; }
        .legal-link { color: white; opacity: 0.5; text-decoration: none; font-size: 0.8rem; margin-top: 10px; display: inline-block; }

        /* MOBILE */
        @media (max-width: 1024px) {
            .hamburger { display: block; }
            nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: white; padding: 20px; border-bottom: 5px solid var(--lime); }
            nav.active { display: flex; }
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html"><img src="logo.png" alt="MAJARDIN" class="logo-img"></a>
        <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <nav id="mainNav">
            <a href="index.html">Accueil</a>
            <a href="equipe.html">L'Équipe</a>
            <a href="realisations.html">Réalisations</a>
            <a href="avis.html">Témoignages</a>
        </nav>
    </header>

    <section>
        <h2>Demande de Devis</h2>
        <p>Étude gratuite de votre projet sous 48h.</p>

        <div class="form-box">
            <form>
                <div class="form-group">
                    <label>Nom & Prénom</label>
                    <input type="text" placeholder="Jean Dupont" required>
                </div>
                
                <div class="form-group">
                    <label>Téléphone</label>
                    <input type="tel" placeholder="06 12 34 56 78" required>
                </div>

                <div class="form-group">
                    <label>Ville de l'intervention</label>
                    <select required>
                        <option value="">Sélectionnez votre ville...</option>
                        <optgroup label="Pévèle Carembault">
                            <option>Orchies</option><option>Templeuve-en-Pévèle</option><option>Cysoing</option><option>Pont-à-Marcq</option><option>Aix-en-Pévèle</option><option>Attiches</option><option>Auchy-lez-Orchies</option><option>Avelin</option><option>Bachy</option><option>Bersée</option><option>Bouvignies</option><option>Camphin-en-Pévèle</option><option>Cappelle-en-Pévèle</option><option>Chemy</option><option>Cobrieux</option><option>Coutiches</option><option>Ennevelin</option><option>Genech</option><option>Gondecourt</option><option>Herrin</option><option>Landas</option><option>Louvil</option><option>Mérignies</option><option>Moncheaux</option><option>Mons-en-Pévèle</option><option>Mouchin</option><option>Nomain</option><option>Ostricourt</option><option>Phalempin</option><option>Thumeries</option><option>Tourmignies</option><option>Wahagnies</option><option>Wannehain</option>
                        </optgroup>
                        <optgroup label="Hainaut & Environs">
                            <option>Saint-Amand-les-Eaux</option><option>Hasnon</option><option>Lecelles</option><option>Rosult</option><option>Millonfosse</option><option>Nivelle</option><option>Bousignies</option><option>Brillon</option><option>Sars-et-Rosières</option><option>Tilloy-lez-Marchiennes</option>
                        </optgroup>
                        <option value="Autre">Autre (Précisez dans le message)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Type de projet</label>
                    <select required>
                        <option value="">Choisissez une prestation...</option>
                        <option>Création / Aménagement</option>
                        <option>Entretien annuel / Ponctuel</option>
                        <option>Élagage / Abattage</option>
                    </select>
                </div>

                <div class="form-group">
                    <label>Détails de votre message</label>
                    <textarea rows="4" placeholder="Surface, accès, végétaux souhaités..."></textarea>
                </div>

                <button type="submit" class="btn-submit">Envoyer ma demande</button>
            </form>
        </div>
    </section>

    <footer>
        <p>MAJARDIN SARL — 06 12 26 79 66 — majardin59@gmail.com</p>
        <a href="mentions.html" class="legal-link">Mentions Légales</a>
    </footer>

    <script>
        function toggleMenu() {
            document.getElementById('mainNav').classList.toggle('active');
        }
    </script>
</body>
</html>
