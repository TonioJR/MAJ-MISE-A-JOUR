<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réalisations | MAJARDIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #1B4332; --lime: #B5D51E; --soft-bg: #F9FBF9; --white: #FFFFFF; --shadow: 0 10px 30px rgba(0,0,0,0.08); }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Inter', sans-serif; scroll-behavior: smooth; }
        body { background: var(--soft-bg); color: var(--dark); line-height: 1.7; }

        /* HEADER IDENTIQUE PARTOUT */
        header { background: var(--white); padding: 10px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--lime); position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo-container img { height: 65px !important; width: auto; display: block; }
        nav { display: flex; gap: 30px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; letter-spacing: 1.5px; }
        .btn-devis { text-decoration: none; background: var(--dark); color: var(--lime) !important; width: 130px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 900; transition: all 0.4s ease; }
        .btn-devis:hover { transform: scale(1.1); background: #255a43; }

        /* SECTION PORTFOLIO */
        section { padding: 80px 10%; max-width: 1400px; margin: auto; text-align: center; }
        .section-title h2 { font-size: 2.5rem; text-transform: uppercase; letter-spacing: 3px; position: relative; display: inline-block; padding-bottom: 15px; margin-bottom: 60px; }
        .section-title h2::after { content: ''; position: absolute; width: 80px; height: 5px; background: var(--lime); bottom: 0; left: 50%; transform: translateX(-50%); }

        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; }
        .portfolio-item { position: relative; background: white; border-radius: 15px; overflow: hidden; box-shadow: var(--shadow); transition: 0.4s; }
        .portfolio-item:hover { transform: translateY(-10px); }
        .portfolio-item img { width: 100%; height: 400px; object-fit: cover; transition: 0.6s; }
        .portfolio-item:hover img { transform: scale(1.08); }
        
        .project-overlay { position: absolute; bottom: 0; left: 0; width: 100%; padding: 30px; background: linear-gradient(transparent, rgba(27,67,50,0.9)); color: white; text-align: left; }
        .project-overlay h3 { font-size: 1.4rem; text-transform: uppercase; margin-bottom: 5px; }
        .project-city { background: var(--lime); color: var(--dark); font-size: 0.7rem; font-weight: 900; padding: 5px 12px; border-radius: 20px; text-transform: uppercase; }

        /* FOOTER */
        footer { background: var(--dark); color: white; padding: 60px 10%; text-align: center; }
        .socials a { color: white; font-size: 2rem; margin: 0 20px; transition: 0.3s; text-decoration: none; }
        .socials a:hover { color: var(--lime); transform: translateY(-5px); display: inline-block; }
        .legal-link { color: white; opacity: 0.4; font-size: 0.8rem; text-decoration: none; display: block; margin-top: 30px; }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-container"><img src="logo.png" alt="MAJARDIN"></a>
        <nav>
            <a href="index.html">Accueil</a><a href="equipe.html">L'Équipe</a><a href="realisations.html">Réalisations</a><a href="avis.html">Témoignages</a>
            <a href="contact.html" class="btn-devis">Devis</a>
        </nav>
    </header>

    <section>
        <div class="section-title"><h2>Nos Chantiers Récents</h2></div>
        <div class="portfolio-grid">
            <div class="portfolio-item">
                <img src="chantier1.jpg" alt="Terrasse Majardin">
                <div class="project-overlay">
                    <span class="project-city">Pévèle Carembault</span>
                    <h3>Aménagement de Terrasse & Massifs</h3>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="chantier2.jpg" alt="Entretien Majardin">
                <div class="project-overlay">
                    <span class="project-city">Hainaut</span>
                    <h3>Entretien & Engazonnement</h3>
                </div>
            </div>
            <div class="portfolio-item">
                <img src="chantier3.jpg" alt="Elagage Majardin">
                <div class="project-overlay">
                    <span class="project-city">Orchies</span>
                    <h3>Élagage & Taille de Sécurité</h3>
                </div>
            </div>
        </div>
    </section>

    <footer>
        <div class="socials">
            <a href="https://www.instagram.com/majardinpaysagiste/"><i class="fab fa-instagram"></i></a>
            <a href="https://www.facebook.com/MAJardinpaysagiste"><i class="fab fa-facebook-f"></i></a>
            <a href="https://wa.me/33612267966"><i class="fab fa-whatsapp"></i></a>
        </div>
        <p>MAJARDIN © 2026 — 06 12 26 79 66</p>
        <a href="mentions.html" class="legal-link">Mentions Légales</a>
    </footer>
</body>
</html>
