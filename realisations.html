<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Réalisations | MAJARDIN</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --dark: #1B4332; --lime: #B5D51E; --soft: #F9FBF9; --white: #FFFFFF; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; transition: 0.3s; }
        body { background: var(--soft); color: var(--dark); }
        header { background: var(--white); padding: 12px 5%; display: flex; justify-content: space-between; align-items: center; border-bottom: 5px solid var(--lime); position: sticky; top: 0; z-index: 2000; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .logo-img { height: 65px !important; width: auto; }
        nav { display: flex; gap: 25px; align-items: center; }
        nav a { text-decoration: none; color: var(--dark); font-weight: 700; font-size: 0.85rem; text-transform: uppercase; }
        .btn-devis-nav { background: var(--dark); color: var(--lime) !important; width: 130px; height: 45px; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 900; }
        .hamburger { display: none; font-size: 1.8rem; cursor: pointer; color: var(--dark); background: none; border: none; }
        section { padding: 80px 10%; max-width: 1300px; margin: auto; text-align: center; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(380px, 1fr)); gap: 30px; margin-top: 50px; }
        .project-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 20px rgba(0,0,0,0.05); position: relative; }
        .project-card img { width: 100%; height: 350px; object-fit: cover; }
        .project-info { padding: 20px; background: var(--dark); color: white; text-align: left; }
        .badge { position: absolute; top: 15px; right: 15px; background: var(--lime); color: var(--dark); padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.7rem; }
        footer { background: var(--dark); color: white; padding: 50px 10%; text-align: center; }
        @media (max-width: 1024px) { .hamburger { display: block; } nav { display: none; flex-direction: column; position: absolute; top: 100%; left: 0; width: 100%; background: white; padding: 30px; border-bottom: 5px solid var(--lime); } nav.active { display: flex; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html"><img src="logo.png" alt="MAJARDIN" class="logo-img"></a>
        <button class="hamburger" onclick="toggleMenu()"><i class="fas fa-bars"></i></button>
        <nav id="mainNav">
            <a href="index.html">Accueil</a><a href="equipe.html">L'Équipe</a><a href="realisations.html">Réalisations</a><a href="avis.html">Témoignages</a>
            <a href="contact.html" class="btn-devis-nav">Devis</a>
        </nav>
    </header>
    <section>
        <h2 style="font-size: 2.5rem; text-transform: uppercase; letter-spacing: 2px;">Nos Chantiers</h2>
        <div class="grid">
            <div class="project-card">
                <span class="badge">ORCHIES</span>
                <img src="chantier1.jpg">
                <div class="project-info"><h3>Aménagement Paysager Complet</h3><p>Terrasse pierre bleue et massifs.</p></div>
            </div>
            <div class="project-card">
                <span class="badge">SAINT-AMAND</span>
                <img src="chantier2.jpg">
                <div class="project-info"><h3>Entretien de Propriété</h3><p>Tonte, taille et engazonnement.</p></div>
            </div>
        </div>
    </section>
    <footer>
        <p>MAJARDIN © 2026 — 06 12 26 79 66</p>
        <a href="mentions.html" style="color:white; opacity:0.4; font-size:0.8rem; text-decoration:none; display:block; margin-top:20px;">Mentions Légales</a>
    </footer>
    <script>function toggleMenu() { document.getElementById('mainNav').classList.toggle('active'); }</script>
</body>
</html>
